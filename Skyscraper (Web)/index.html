<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyscraper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameArea">
        <div id="gameBoard">
            <table id="board">
                <tr>
                    <td>
                        <button class="corner" disabled></button>
                    </td>
                    <td>
                        <button class="count" id="T0" disabled></button>
                    </td>
                    <td>
                        <button class="count" id="T1" disabled></button>
                    </td>
                    <td>
                        <button class="count" id="T2" disabled></button>
                    </td>
                    <td>
                        <button class="count" id="T3" disabled></button>
                    </td>
                    <td>
                        <button class="corner" disabled></button>
                    </td>
                </tr>
                <tr>
                    <td>
                        <button class="count" id="L0" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="00" onclick="FillNum(0, 0)" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="01" onclick="FillNum(0, 1)" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="02" onclick="FillNum(0, 2)" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="03" onclick="FillNum(0, 3)" disabled></button>
                    </td>
                    <td>
                        <button class="count" id="R0" disabled></button>
                    </td>
                </tr>
                <tr>
                    <td>
                        <button class="count" id="L1" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="10" onclick="FillNum(1, 0)" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="11" onclick="FillNum(1, 1)" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="12" onclick="FillNum(1, 2)" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="13" onclick="FillNum(1, 3)" disabled></button>
                    </td>
                    <td>
                        <button class="count" id="R1" disabled></button>
                    </td>
                </tr>
                <tr>
                    <td>
                        <button class="count" id="L2" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="20" onclick="FillNum(2, 0)" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="21" onclick="FillNum(2, 1)" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="22" onclick="FillNum(2, 2)" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="23" onclick="FillNum(2, 3)" disabled></button>
                    </td>
                    <td>
                        <button class="count" id="R2" disabled></button>
                    </td>
                </tr>
                <tr>
                    <td>
                        <button class="count" id="L3" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="30" onclick="FillNum(3, 0)" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="31" onclick="FillNum(3, 1)" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="32" onclick="FillNum(3, 2)" disabled></button>
                    </td>
                    <td>
                        <button class="cell" id="33" onclick="FillNum(3, 3)" disabled></button>
                    </td>
                    <td>
                        <button class="count" id="R3" disabled></button>
                    </td>
                </tr>
                <tr>
                    <td>
                        <button class="corner" disabled></button>
                    </td>
                    <td>
                        <button class="count" id="B0" disabled></button>
                    </td>
                    <td>
                        <button class="count" id="B1" disabled></button>
                    </td>
                    <td>
                        <button class="count" id="B2" disabled></button>
                    </td>
                    <td>
                        <button class="count" id="B3" disabled></button>
                    </td>
                    <td>
                        <button class="corner" disabled></button>
                    </td>
                </tr>
            </table>
        </div>
        <div id="game-settings">
            <button id="startBtn" onclick="Start()">Start</button>
            <button id="restartBtn" onclick="Restart()">Restart</button>
            <button id="randomBtn" onclick="Random()">Random</button>
            <button id="solveBtn" onclick="Solve()">Solve</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
